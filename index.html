<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>


<body class="bg-mist-800 text-white font-mono">

    <div id="messageDiv"
        class="hidden fixed bottom-2 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-black px-4 py-2 rounded">
        <span id="message"></span>
    </div>

    <div class="flex h-auto w-full bg-mist-950 px-2 py-2 gap-2">
        <div>
            <span>Mänguandmed:</span>
            <div class="grid grid-cols-2 text-sm gap-2">
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Staatus: <span
                        id="gameStatus">Ootamas</span></span>
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Käik: <span
                        id="gameTurn">Ootamas</span></span>
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Hetkel käib:
                    <span id="gameCurrentPlayer">Ootamas</span></span>
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Viimane
                    võitja: <span id="gameLastWinner">Ootamas</span></span>
            </div>
        </div>
        <div>
            <span>Sinu andmed:</span>
            <div class="grid grid-cols-3 text-sm gap-2">
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Nimi: <span
                        id="yourName">Ootamas</span></span>
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Raha: <span
                        id="yourMoney">Ootamas</span>$</span>
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Sissetulek: <span
                        id="yourIncome">null</span>$</span>
                <span class="bg-mauve-950 text-mauve-400 border border-clifford-400 px-2 rounded py-0.5 ">Valitud:
                    <span id="selectedHex">Ootamas</span></span>
            </div>
        </div>

        <div>
            <span>Pood:</span>
            <div class="grid grid-cols-4 gap-2 ">
                <button id="buyUnit" data-type="peasant"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Peasant</button>
                <button id="buyUnit" data-type="spearman"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Spearman</button>
                <button id="buyUnit" data-type="baron"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Baron</button>
                <button id="buyUnit" data-type="knight"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Knight</button>
                <button id="buyUnit" data-type="farm"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Farm</button>
                <button id="buyUnit" data-type="tower"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Tower</button>
                <button id="buyUnit" data-type="fortress"
                    class="bg-mauve-900 text-mauve-400 border border-mauve-400 px-2 rounded py-0.5 text-lg hover:text-mauve-300 hover:border-mauve-300 hover:cursor-pointer">Fortress</button>
            </div>
        </div>
        <div>
            <input type="text" id="playerNameInput"
                class="bg-mist-700 text-white border border-mist-500 px-2 rounded py-0.5 text-lg"
                placeholder="mängija nimi">
            <button class="bg-green-950 text-green-400 border border-green-400 px-2 rounded py-0.5 text-lg "
                id="joinGame">Liitu</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <button class="bg-blue-900 text-blue-400 border border-blue-400 px-2 rounded py-0.5 text-lg"
                id="startGame">Alusta</button>
            <button class="bg-blue-900 text-blue-400 border border-blue-400 px-2 rounded py-0.5 text-lg"
                id="endTurn">Lõpeta käik</button>
            <button class="bg-blue-900 text-blue-400 border border-blue-400 px-2 rounded py-0.5 text-lg"
                id="buyUnit">Osta üksus</button>
        </div>

    </div>
    <div class="gamePage">

    </div>

    <div id="notificationDiv" class="hidden absolute bottom-0 left-0 right-0 bg-mauve-500 text-center py-2">
        Sõnum: <span id="notification" class="font-bold"></span>
    </div>
    <script src="script.js"></script>
</body>



</html>
